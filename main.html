<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Открытка | Поздравление</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <div class="black-bg"></div>
    
    <div class="stars-section" id="starsSection">
        <canvas id="starsCanvas"></canvas>
        <div class="intro-text" id="introText"></div>
        <div class="cursor-arrow" id="cursorArrow">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5.5 3.5L18.5 12L11 13.5L9.5 21L5.5 3.5Z" fill="white" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
            <span class="arrow-text">Open me</span>
        </div>
    </div>

    <div class="message-section" id="messageSection">
        <div class="message-container">
            <div class="happy-text" id="happyText"></div>
        </div>
    </div>

    <script src="Js/core.js"></script>
</body>
</html>
